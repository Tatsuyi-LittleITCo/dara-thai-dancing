name: Build and Deploy via SFTP (Next.js Export)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Export static site
        run: npm run export

      # 5️⃣ Deploy to staging or live via SFTP
      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ftp.darathaidancing.com.au
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          protocol: ftps           # cPanel requires FTPS
          port: 21                 # default FTPS port
          server-dir: /public_html/
          dry-run: false           # set true for testing without uploading
